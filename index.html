function createNode(id, name, type, size, x, y) {
    const nodeDiv = document.createElement('div');
    nodeDiv.id = `node-${id}`;
    nodeDiv.className = `node n${size}`;
    nodeDiv.style.left = `${x}%`;
    nodeDiv.style.top = `${y}%`;
    nodeDiv.dataset.id = id;
    nodeDiv.dataset.type = type;

    const bldgDiv = document.createElement('div');
    bldgDiv.className = `bldg bldg-${type} sz-${size}`;
    nodeDiv.appendChild(bldgDiv);

    const labelDiv = document.createElement('div');
    labelDiv.className = 'n-label';
    labelDiv.textContent = name;
    nodeDiv.appendChild(labelDiv);

    mapDiv.appendChild(nodeDiv);
    nodes[id] = { element: nodeDiv, x: x, y: y, type: type, size: size };
}

N.forEach(node => {
    const [id, name, type] = node;
    const pos = nodePositions[id];
    if (pos) {
        createNode(id, name, type, pos.size, pos.x, pos.y);
    }
});

function drawEdges() {
    edgesSvg.innerHTML = ''; // Clear existing edges
    R.forEach(edge => {
        const [fromId, toId, type] = edge;
        const fromNode = nodes[fromId];
        const toNode = nodes[toId];

        if (fromNode && toNode) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', `${fromNode.x}%`);
            line.setAttribute('y1', `${fromNode.y}%`);
            line.setAttribute('x2', `${toNode.x}%`);
            line.setAttribute('y2', `${toNode.y}%`);
            line.setAttribute('class', `edge e-${type}`);
            line.dataset.from = fromId;
            line.dataset.to = toId;
            line.dataset.type = type;
            edgesSvg.appendChild(line);
        }
    });
}

// Interaction logic
let activeNode = null;

mapDiv.addEventListener('click', (e) => {
    const clickedNode = e.target.closest('.node');
    if (clickedNode) {
        const nodeId = clickedNode.dataset.id;
        if (activeNode === nodeId) {
            // Deselect if clicking the same node again
            resetMapState();
            activeNode = null;
        } else {
            setActiveNode(nodeId);
        }
    } else if (!e.target.closest('#sidebar')) {
        // Clicked on map background, reset if no node was clicked
        resetMapState();
        activeNode = null;
    }
});

mapDiv.addEventListener('mouseover', (e) => {
    const hoveredNode = e.target.closest('.node');
    if (hoveredNode && hoveredNode.dataset.id !== activeNode) {
        hoveredNode.classList.add('hovered');
    } else if (!hoveredNode && activeNode) {
        // If mouse leaves a node and there's an active node, ensure it's not dimmed
        Object.values(nodes).forEach(node => {
            if (node.element.dataset.id === activeNode) {
                node.element.classList.remove('dim');
            }
        });
    }
});

mapDiv.addEventListener('mouseout', (e) => {
    const unhoveredNode = e.target.closest('.node');
    if (unhoveredNode) {
        unhoveredNode.classList.remove('hovered');
    }
});

function setActiveNode(nodeId) {
    activeNode = nodeId;
    Object.values(nodes).forEach(node => {
        node.element.classList.remove('act', 'h1', 'h2', 'dim');
        node.element.classList.add('dim');
    });
    document.querySelectorAll('.edge').forEach(edge => {
        edge.classList.add('dim');
        edge.classList.remove('h1', 'h2');
    });

    const selectedNode = nodes[nodeId];
    if (selectedNode) {
        selectedNode.element.classList.remove('dim');
        selectedNode.element.classList.add('act');

        const relatedNodes = new Set();
        const firstDegreeEdges = new Set();
        const secondDegreeEdges = new Set();

        // Find 1st degree connections
        R.forEach(edge => {
            if (edge[0] === nodeId) {
                relatedNodes.add(edge[1]);
                firstDegreeEdges.add(edge);
            } else if (edge[1] === nodeId) {
                relatedNodes.add(edge[0]);
                firstDegreeEdges.add(edge);
            }
        });

        // Find 2nd degree connections
        const firstDegreeNodesArray = Array.from(relatedNodes);
        firstDegreeNodesArray.forEach(firstNodeId => {
            R.forEach(edge => {
                if ((edge[0] === firstNodeId && edge[1] !== nodeId) || (edge[1] === firstNodeId && edge[0] !== nodeId)) {
                    relatedNodes.add(edge[0]);
                    relatedNodes.add(edge[1]);
                    secondDegreeEdges.add(edge);
                }
            });
        });

        // Highlight 1st and 2nd degree nodes
        relatedNodes.forEach(id => {
            if (nodes[id]) {
                nodes[id].element.classList.remove('dim');
                if (firstDegreeNodesArray.includes(id)) {
                    nodes[id].element.classList.add('h1');
                } else {
                    nodes[id].element.classList.add('h2');
                }
            }
        });

        // Highlight edges
        document.querySelectorAll('.edge').forEach(edgeElement => {
            const edge = [edgeElement.dataset.from, edgeElement.dataset.to, edgeElement.dataset.type];
            if (firstDegreeEdges.has(edge)) {
                edgeElement.classList.remove('dim');
                edgeElement.classList.add('h1');
            } else if (secondDegreeEdges.has(edge)) {
                edgeElement.classList.remove('dim');
                edgeElement.classList.add('h2');
            }
        });
    }
}

function resetMapState() {
    Object.values(nodes).forEach(node => {
        node.element.classList.remove('act', 'h1', 'h2', 'dim');
    });
    document.querySelectorAll('.edge').forEach(edge => {
        edge.classList.remove('act', 'h1', 'h2', 'dim');
    });
}

// Filter edges based on checkbox state
document.querySelectorAll('.edge-filter').forEach(checkbox => {
    checkbox.addEventListener('change', (e) => {
        const type = e.target.value;
        const isChecked = e.target.checked;
        document.querySelectorAll(`.edge.e-${type}`).forEach(edge => {
            if (isChecked) {
                edge.classList.remove('hide');
            } else {
                edge.classList.add('hide');
            }
        });
    });
});

// Whale movement (adjusting for map size)
function updateWhalePositions() {
    const mapRect = mapDiv.getBoundingClientRect();
    const mapWidth = mapRect.width;
    const mapHeight = mapRect.height;

    // Adjust animation keyframes based on map dimensions
    const styleSheet = document.styleSheets[0];
    for (let i = 0; i < styleSheet.cssRules.length; i++) {
        const rule = styleSheet.cssRules[i];
        if (rule.name === 'swim1') {
            rule.appendRule(`45%{transform:translate(${mapWidth * 0.15}px,0) scaleX(1)}`);
            rule.appendRule(`50%{transform:translate(${mapWidth * 0.15}px,0) scaleX(-1)}`);
        } else if (rule.name === 'swim2') {
            rule.appendRule(`45%{transform:translate(${-mapWidth * 0.15}px,0) scaleX(-1)}`);
            rule.appendRule(`50%{transform:translate(${-mapWidth * 0.15}px,0) scaleX(1)}`);
        } else if (rule.name === 'swim3') {
            rule.appendRule(`45%{transform:translate(0,${mapHeight * 0.15}px) scaleX(1)}`);
            rule.appendRule(`50%{transform:translate(0,${mapHeight * 0.15}px) scaleX(-1)}`);
        } else if (rule.name === 'swim4') {
            rule.appendRule(`45%{transform:translate(0,${-mapHeight * 0.15}px) scaleX(-1)}`);
            rule.appendRule(`50%{transform:translate(0,${-mapHeight * 0.15}px) scaleX(1)}`);
        }
    }
}
